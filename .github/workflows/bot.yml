name: Bot Galleria Farms - Descarga Reporte

on:
  schedule:
    - cron: '0 14 * * *'   # 7:00 AM hora Mexico/PDT (UTC-7)
    - cron: '0 19 * * *'   # 12:00 PM hora Mexico/PDT (UTC-7)
    - cron: '0 23 * * *'   # 4:00 PM hora Mexico/PDT (UTC-7)
  workflow_dispatch:         # Permite ejecutarlo manualmente desde GitHub

jobs:
  descargar-reporte:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install python-dateutil
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar bot
        env:
          GF_USER: ${{ secrets.GF_USER }}
          GF_PASSWORD: ${{ secrets.GF_PASSWORD }}
        run: python bot.py

      - name: Guardar reporte como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-galleria-${{ github.run_number }}
          path: |
            reporte_galleria_*.*
            debug_*.png
          retention-days: 30
