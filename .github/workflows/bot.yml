name: Bot Galleria Farms - Descarga Reporte

on:
  schedule:
    - cron: '0 */6 * * *'   # Cada 6 horas (puedes cambiar esto)
  workflow_dispatch:          # También permite ejecutarlo manualmente desde GitHub

jobs:
  descargar-reporte:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar bot
        env:
          GF_USER: ${{ secrets.GF_USER }}
          GF_PASSWORD: ${{ secrets.GF_PASSWORD }}
        run: python bot.py

      - name: Guardar reporte como artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-galleria-${{ github.run_number }}
          path: reporte_galleria.xlsx
          retention-days: 7   # Guarda el archivo 7 días en GitHub
